<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTB Label Verification</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="icon" href="./logo.svg" type="image/svg+xml">
</head>
<body>
  <header class="app-header">
    <img class="app-logo" src="./logo.svg" alt="" width="48" height="48">
    <div class="app-title">
      <h1>TTB Label Verification</h1>
    </div>
  </header>

  <nav class="app-nav" aria-label="Modes">
    <a href="./index.html" aria-current="page">Single label</a>
    <a href="./batch.html">Batch</a>
  </nav>

  <main id="app">
    <form id="verify-form" novalidate>
      <fieldset>
        <legend>1. Label image</legend>
        <div class="field-row">
          <label class="file-label" for="labelImage">Choose a label photo or scan</label>
          <input type="file" id="labelImage" accept="image/*">
        </div>
        <label class="checkbox">
          <input type="checkbox" id="binarize" checked>
          Clean up the image before reading (recommended)
        </label>
        <img id="preview" class="preview" alt="Selected label preview" hidden>
      </fieldset>

      <fieldset>
        <legend>2. Application values to check</legend>

        <div class="grid">
          <label class="checkbox import-checkbox">
            <input type="checkbox" id="isImport">
            Imported (requires country of origin)
          </label>
          <label>Country of origin
            <input type="text" id="countryOfOrigin" placeholder="imports only" autocomplete="off" disabled>
          </label>

          <label>Brand name
            <input type="text" id="brandName" autocomplete="off">
          </label>
          <label>Class / type
            <input type="text" id="classType" autocomplete="off">
          </label>
          <label>Alcohol content
            <input type="text" id="abv" placeholder="e.g. 45% Alc./Vol. (90 Proof)" autocomplete="off">
          </label>
          <label>Net contents
            <input type="text" id="netContents" placeholder="e.g. 750 mL" autocomplete="off">
          </label>
          <label class="full-row">Producer / bottler
            <input type="text" id="producer" autocomplete="off">
          </label>
        </div>
      </fieldset>

      <button type="submit" id="verifyBtn" class="primary">Verify label</button>
    </form>

    <p id="status" class="status" role="status" aria-live="polite"></p>
    <section id="result" aria-live="polite"></section>
  </main>

  <footer class="app-footer">
    Prototype for application evaluation only — runs entirely in your browser.
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
